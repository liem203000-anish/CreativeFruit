<body class="bg-background text-on-background font-body-md bg-mesh min-h-screen flex items-center justify-center p-md">
<!-- Auth Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Brand Header -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center gap-2 mb-sm">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-container to-primary flex items-center justify-center shadow-xl shadow-primary-container/20">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
</div>
<h1 class="font-h1 text-h2 tracking-tighter bg-gradient-to-r from-primary to-primary-container bg-clip-text text-transparent">VideoAutoStudio</h1>
</div>
<p class="text-on-surface-variant font-body-sm">Sign in to your creative engine</p>
</div>
<!-- Glass Login Card -->
<div class="bg-surface-container/60 backdrop-blur-xl rounded-xl glass-highlight shadow-2xl shadow-black/40 p-xl border border-white/5 relative overflow-hidden group">
<!-- Subtle internal glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 blur-[80px] pointer-events-none"></div>
<form class="space-y-gutter relative z-10">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1" for="email">Email Address</label>
<div class="relative group/input">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within/input:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-container-highest/50 border border-outline-variant rounded-lg py-3 pl-12 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-outline/50 font-body-sm" id="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center ml-1">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="text-primary font-label-caps text-[11px] hover:text-primary-container transition-colors tracking-wide" href="#">FORGOT PASSWORD?</a>
</div>
<div class="relative group/input">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within/input:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-highest/50 border border-outline-variant rounded-lg py-3 pl-12 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-outline/50 font-body-sm" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary font-button text-button py-3.5 rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-container hover:-translate-y-0.5 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Sign In -->
<button class="w-full bg-white/5 border border-white/10 text-on-surface font-button text-button py-3 rounded-lg hover:bg-white/10 hover:border-white/20 transition-all duration-300 flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12 5.04c1.94 0 3.51.68 4.75 1.83l3.48-3.48C18.1 1.44 15.3 0 12 0 7.31 0 3.25 2.69 1.17 6.6l3.86 3C5.97 7.07 8.74 5.04 12 5.04z" fill="#EA4335"></path>
<path d="M23.64 12.2c0-.77-.07-1.52-.19-2.25H12v4.26h6.52c-.28 1.47-1.12 2.71-2.38 3.56l3.71 2.88c2.16-1.99 3.41-4.91 3.41-8.45z" fill="#FBBC05"></path>
<path d="M5.03 14.75c-.23-.69-.36-1.42-.36-2.18s.13-1.49.36-2.18l-3.86-3C.44 8.87 0 10.39 0 12s.44 3.13 1.17 4.59l3.86-2.84z" fill="#4285F4"></path>
<path d="M12 24c3.24 0 5.95-1.07 7.94-2.91l-3.71-2.88c-1.09.73-2.49 1.16-4.23 1.16-3.26 0-6.03-2.03-7.14-4.88l-3.86 3C3.25 21.31 7.31 24 12 24z" fill="#34A853"></path>
</svg>
                    Google

            Don't have an account?

</p>

<div class="fixed top-20 left-10 w-64 h-48 opacity-20 pointer-events-none hidden xl:block">

</div>
</div>

</div>
<div class="p-4 space-y-2">
<div class="flex justify-between">
<div class="h-3 w-20 bg-primary/30 rounded"></div>
<div class="h-3 w-10 bg-outline-variant/30 rounded"></div>
</div>
<div class="h-1 w-full bg-outline-variant/20 rounded-full overflow-hidden">
