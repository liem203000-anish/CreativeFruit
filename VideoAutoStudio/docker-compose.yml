version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: videoautostudio-db
    environment:
      POSTGRES_DB: videoautostudio
      POSTGRES_USER: videoautostudio_user
      POSTGRES_PASSWORD: videoautostudio_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videoautostudio_user -d videoautostudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: videoautostudio-api
    environment:
      DATABASE_URL: postgresql://videoautostudio_user:videoautostudio_pass_2024@postgres:5432/videoautostudio
      JWT_SECRET: ${JWT_SECRET:-videoautostudio_jwt_secret_change_in_production}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:4000/api/auth/google/callback}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: videoautostudio-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
